name: Build Custom Android APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip and Locate Project Root
        run: |
          unzip nexfile_manager_flutter.zip -d extracted_content
          TARGET_DIR=$(find extracted_content -name "pubspec.yaml" -exec dirname {} \;)
          echo "Project root found at: $TARGET_DIR"
          mv $TARGET_DIR/* . 2>/dev/null || true
          mv $TARGET_DIR/.* . 2>/dev/null || true

      - name: Handle JPG Admin Photo
        run: |
          echo "Checking and converting admin photo if needed..."
          cd assets/images 2>/dev/null || cd extracted_content/assets/images 2>/dev/null || true
          if [ -f "admin.jpg" ]; then
            cp admin.jpg admin.png
            echo "admin.jpg converted to admin.png format"
          elif [ -f "admin.jpeg" ]; then
            cp admin.jpeg admin.png
            echo "admin.jpeg converted to admin.png format"
          fi
          cd - > /dev/null

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
