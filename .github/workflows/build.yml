name: Build Custom Android APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip and Locate Project Root
        run: |
          unzip nexfile_manager_flutter.zip -d extracted_content
          TARGET_DIR=$(find extracted_content -name "pubspec.yaml" -exec dirname {} \;)
          echo "Project root found at: $TARGET_DIR"
          mv $TARGET_DIR/* . 2>/dev/null || true
          mv $TARGET_DIR/.* . 2>/dev/null || true

      - name: Clean Invalid Packages
        run: |
          echo "Removing invalid scanner, storage_details, and dropbox dependencies..."
          if [ -f "pubspec.yaml" ]; then
            sed -i '/document_scanner_flutter/d' pubspec.yaml
            sed -i '/storage_details/d' pubspec.yaml
            sed -i '/dropbox/I d' pubspec.yaml
          fi
          echo "Dependencies cleaned up successfully."

      - name: Handle JPG Admin Photo
        run: |
          echo "Checking and converting admin photo safely..."
          find . -type f \( -name "admin.jpg" -o -name "admin.jpeg" \) | while read -r file; do
            dir=$(dirname "$file")
            cp "$file" "$dir/admin.png"
            echo "Successfully converted $file to admin.png inside $dir"
          done

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Upgrade and Install Dependencies
        run: |
          flutter pub upgrade --major-versions
          flutter pub get

      - name: Fix Android v1 Embedding
        run: |
          echo "Upgrading project to Android v2 embedding..."
          # MainActivity को नए v2 एम्बेडिंग तरीके पर अपडेट करना
          find android/app/src/main -name "MainActivity.java" -o -name "MainActivity.kt" | while read -r file; do
            if [[ "$file" == *.java ]]; then
              sed -i 's/import io.flutter.app.FlutterActivity;/import io.flutter.embedding.android.FlutterActivity;/' "$file"
            elif [[ "$file" == *.kt ]]; then
              sed -i 's/import io.flutter.app.FlutterActivity/import io.flutter.embedding.android.FlutterActivity/' "$file"
            fi
          done
          # AndroidManifest.xml से पुरानी लाइनों को हटाना या अपडेट करना
          if [ -f "android/app/src/main/AndroidManifest.xml" ]; then
            sed -i '/android:name="io.flutter.app.FlutterApplication"/d' android/app/src/main/AndroidManifest.xml
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
