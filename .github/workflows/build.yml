name: Build Custom Android APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip and Locate Project Root
        run: |
          unzip nexfile_manager_flutter.zip -d extracted_content
          TARGET_DIR=$(find extracted_content -name "pubspec.yaml" -exec dirname {} \;)
          echo "Project root found at: $TARGET_DIR"
          mv $TARGET_DIR/* . 2>/dev/null || true
          mv $TARGET_DIR/.* . 2>/dev/null || true

      - name: Clean and Fix pubspec.yaml
        run: |
          echo "Cleaning dependencies and fixing duplicates..."
          if [ -f "pubspec.yaml" ]; then
            # खराब पड़े पैकेजों को हटाना
            sed -i '/document_scanner_flutter/d' pubspec.yaml
            sed -i '/storage_details/d' pubspec.yaml
            sed -i '/dropbox/I d' pubspec.yaml
            
            # पहले से मौजूद intl की सभी लाइनों को हटाना ताकि डुप्लीकेट एरर न आए
            sed -i '/intl:/d' pubspec.yaml
            sed -i '/\^0.19.0/d' pubspec.yaml
            
            # एक साफ और नया intl पैकेज जोड़ना जो वर्जन टकराव न करे
            sed -i '/dependencies:/a \  intl: any' pubspec.yaml
          fi
          echo "pubspec.yaml clean up completed."

      - name: Handle JPG Admin Photo
        run: |
          echo "Checking and converting admin photo safely..."
          find . -type f \( -name "admin.jpg" -o -name "admin.jpeg" \) | while read -r file; do
            dir=$(dirname "$file")
            cp "$file" "$dir/admin.png"
          done

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter (Balanced Version)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: Install Dependencies Safely
        run: |
          flutter pub get || flutter pub get --suppress-analytics

      - name: Force Fix Android v1 Embedding
        run: |
          echo "Bypassing v1 embedding restrictions..."
          mkdir -p android/app/src/main/java/io/flutter/plugins
          touch android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java
          
          find android/ -name "MainActivity.java" -o -name "MainActivity.kt" -o -name "GeneratedPluginRegistrant.java" 2>/dev/null | while read -r file; do
            if [[ "$file" == *.java ]]; then
              sed -i 's/import io.flutter.app.FlutterActivity;/import io.flutter.embedding.android.FlutterActivity;/' "$file"
            elif [[ "$file" == *.kt ]]; then
              sed -i 's/import io.flutter.app.FlutterActivity/import io.flutter.embedding.android.FlutterActivity/' "$file"
            fi
          done

      - name: Build APK
        run: flutter build apk --release --no-shrink

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
