name: Build Custom Android APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip and Locate Project Root
        run: |
          unzip *.zip -d extracted_content
          TARGET_DIR=$(find extracted_content -name "pubspec.yaml" -exec dirname {} \;)
          echo "Project root found at: $TARGET_DIR"
          mv $TARGET_DIR/* . 2>/dev/null || true
          mv $TARGET_DIR/.* . 2>/dev/null || true

      - name: Fix Package Restrictions
        run: |
          echo "Overriding strict package constraints..."
          if [ -f "pubspec.yaml" ]; then
            sed -i 's/permission_handler:.*/permission_handler: any/' pubspec.yaml
          fi

      - name: Nuclear Fix for Android v1 Embedding
        run: |
          echo "Completely deleting legacy android activity files..."
          # पुराने स्टाइल की सभी MainActivity फाइलों को हटाना ताकि टकराव खत्म हो
          find android/app/src/main/ -name "MainActivity.java" -o -name "MainActivity.kt" -exec rm -f {} \;
          
          # पैकेज का नाम ढूंढना (जैसे com.example.app)
          PKG_NAME=$(grep "applicationId" android/app/build.gradle | head -n1 | awk -F'"' '{print $2}' | awk -F"'" '{print $2}' | xargs)
          if [ -z "$PKG_NAME" ]; then
            PKG_NAME="com.example.nexfile_manager_ai"
          fi
          
          # पैकेज नाम के हिसाब से फ़ोल्डर का रास्ता तय करना
          PKG_PATH=$(echo $PKG_NAME | tr '.' '/')
          mkdir -p android/app/src/main/kotlin/$PKG_PATH
          
          # एकदम नई, आधुनिक v2 Embedding वाली MainActivity.kt फ़ाइल खुद लिखना
          cat <<EOF > android/app/src/main/kotlin/$PKG_PATH/MainActivity.kt
          package $PKG_NAME
          
          import io.flutter.embedding.android.FlutterActivity
          
          class MainActivity: FlutterActivity() {
          }
          EOF
          echo "Brand new clean v2 MainActivity created successfully."

      - name: Handle JPG Admin Photo
        run: |
          echo "Checking and converting admin photo safely..."
          find . -type f \( -name "admin.jpg" -o -name "admin.jpeg" \) | while read -r file; do
            dir=$(dirname "$file")
            cp "$file" "$dir/admin.png"
          done

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Clean Dependencies
        run: |
          flutter pub upgrade --major-versions
          flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-shrink

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
