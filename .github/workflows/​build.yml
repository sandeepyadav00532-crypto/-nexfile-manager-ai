name: Build Custom Android APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip and Locate Project Root
        run: |
          unzip *.zip -d extracted_content
          TARGET_DIR=$(find extracted_content -name "pubspec.yaml" -exec dirname {} \;)
          echo "Project root found at: $TARGET_DIR"
          mv $TARGET_DIR/* . 2>/dev/null || true
          mv $TARGET_DIR/.* . 2>/dev/null || true
      - name: Force Clean and Fix pubspec.yaml
        run: |
          echo "Overriding strict package constraints and environment limits..."
          if [ -f "pubspec.yaml" ]; then
            # permission_handler और intl को 'any' करना
            sed -i 's/permission_handler:.*/permission_handler: any/' pubspec.yaml
            sed -i 's/intl:.*/intl: any/' pubspec.yaml
            
            # पुराने file_picker को हटाकर उसकी जगह आधुनिक वर्जन सेट करना ताकि v2 एम्बेडिंग क्रैश न हो
            sed -i '/file_picker:/d' pubspec.yaml
            sed -i '/\^6.1.1/d' pubspec.yaml
            sed -i '/dependencies:/a \  file_picker: any' pubspec.yaml
          fi
      - name: Nuclear Fix for Android v1 Embedding
        run: |
          echo "Completely scrubbing legacy v1 embedding structures..."
          find android/app/src/main/ -name "MainActivity.java" -o -name "MainActivity.kt" -exec rm -f {} \;
          
          PKG_NAME=$(grep "applicationId" android/app/build.gradle | head -n1 | sed 's/.*applicationId //; s/"//g; s/'"'"'//g' | xargs)
          if [ -z "$PKG_NAME" ] || [[ "$PKG_NAME" == *.* ]]; then
            PKG_NAME="com.example.nexfile_manager_ai"
          fi
          
          PKG_PATH=$(echo $PKG_NAME | tr '.' '/')
          mkdir -p android/app/src/main/kotlin/$PKG_PATH
          
          cat <<EOF > android/app/src/main/kotlin/$PKG_PATH/MainActivity.kt
          package $PKG_NAME
          
          import io.flutter.embedding.android.FlutterActivity
          
          class MainActivity: FlutterActivity() {
          }
          EOF
          
          if [ -f "android/app/src/main/AndroidManifest.xml" ]; then
            sed -i '/android:name="io.flutter.app.FlutterApplication"/d' android/app/src/main/AndroidManifest.xml
            sed -i 's/io.flutter.app.FlutterActivity/io.flutter.embedding.android.FlutterActivity/g' android/app/src/main/AndroidManifest.xml
          fi
      - name: Handle JPG Admin Photo
        run: |
          echo "Checking and converting admin photo safely..."
          find . -type f \( -name "admin.jpg" -o -name "admin.jpeg" \) | while read -r file; do
            dir=$(dirname "$file")
            cp "$file" "$dir/admin.png"
          done
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter (Target Version)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          - name: Install Dependencies
  run: flutter pub get

- name: Build Release APK
  run: flutter build apk --release

- name: Upload APK Artifact
  uses: actions/upload-artifact@v4
  with:
  name: nexfile-manager-ai-apk
  path: build/app/outputs/flutter-apk/app-release.apk
