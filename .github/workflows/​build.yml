name: Build Custom Android APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip and Locate Project Root
        run: |
          unzip *.zip -d extracted_content
          TARGET_DIR=$(find extracted_content -name "pubspec.yaml" -exec dirname {} \;)
          echo "Project root found at: $TARGET_DIR"
          mv $TARGET_DIR/* . 2>/dev/null || true
          mv $TARGET_DIR/.* . 2>/dev/null || true

      - name: Fix Package Restrictions
        run: |
          echo "Overriding strict package constraints..."
          if [ -f "pubspec.yaml" ]; then
            sed -i 's/permission_handler:.*/permission_handler: any/' pubspec.yaml
          fi

      - name: Force Fix Android v1 Embedding
        run: |
          echo "Rewriting old v1 embedding to modern v2 embedding..."
          # MainActivity की फाइल ढूंढकर पुरानी एक्टिविटी को नए से बदलना
          find android/ -name "MainActivity.java" -o -name "MainActivity.kt" 2>/dev/null | while read -r file; do
            if [[ "$file" == *.java ]]; then
              sed -i 's/import io.flutter.app.FlutterActivity;/import io.flutter.embedding.android.FlutterActivity;/' "$file"
            elif [[ "$file" == *.kt ]]; then
              sed -i 's/import io.flutter.app.FlutterActivity/import io.flutter.embedding.android.FlutterActivity/' "$file"
            fi
          done

      - name: Handle JPG Admin Photo
        run: |
          echo "Checking and converting admin photo safely..."
          find . -type f \( -name "admin.jpg" -o -name "admin.jpeg" \) | while read -r file; do
            dir=$(dirname "$file")
            cp "$file" "$dir/admin.png"
          done

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Clean Dependencies
        run: |
          flutter pub upgrade --major-versions
          flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-shrink

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
