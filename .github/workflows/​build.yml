name: Build Custom Android APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip and Locate Project Root
        run: |
          unzip *.zip -d extracted_content
          TARGET_DIR=$(find extracted_content -name "pubspec.yaml" -exec dirname {} \;)
          echo "Project root found at: $TARGET_DIR"
          mv $TARGET_DIR/* . 2>/dev/null || true
          mv $TARGET_DIR/.* . 2>/dev/null || true

      - name: Fix Package Restrictions
        run: |
          echo "Overriding strict package constraints..."
          if [ -f "pubspec.yaml" ]; then
            sed -i 's/permission_handler:.*/permission_handler: any/' pubspec.yaml
          fi

      - name: Handle JPG Admin Photo
        run: |
          echo "Checking and converting admin photo safely..."
          find . -type f \( -name "admin.jpg" -o -name "admin.jpeg" \) | while read -r file; do
            dir=$(dirname "$file")
            cp "$file" "$dir/admin.png"
          done

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '11' # पुराने फ्लटर वर्जन के लिए जावा 11 सबसे बेस्ट है

      - name: Set up Flutter (Compatible Version)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.6' # यह वर्जन पुरानी एम्बेडिंग वाले एरर को बाईपास कर देगा
          channel: 'stable'

      - name: Install Clean Dependencies
        run: |
          flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-shrink --no-sound-null-safety || flutter build apk --release --no-shrink

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
