name: Clean Android Build
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip and Locate Project Root
        run: |
          unzip Asset.zip -d extracted_content
          TARGET_DIR=$(find extracted_content -name "pubspec.yaml" -exec dirname {} \;)
          echo "Project root found at: $TARGET_DIR"
          mv $TARGET_DIR/* . 2>/dev/null || true
          mv $TARGET_DIR/.* . 2>/dev/null || true

      - name: Completely Remove Dropbox Feature
        run: |
          echo "Removing all Dropbox references from the project..."
          # pubspec.yaml से ड्रॉपबॉक्स हटाना
          if [ -f "pubspec.yaml" ]; then
            sed -i '/dropbox/I d' pubspec.yaml
          fi
          # पूरे प्रोजेक्ट की सभी .dart फाइलों से ड्रॉपबॉक्स की इम्पोर्ट लाइनें हटाना
          find . -name "*.dart" -type f -exec sed -i '/dropbox/I d' {} +
          echo "Dropbox feature completely wiped out."

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
